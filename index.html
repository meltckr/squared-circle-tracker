// Build fighter index from all event data
const ALL_FIGHTERS = {};
function indexFighter(f, eventId) {
  if (!f.name || f.name === 'loss') return;
  const key = f.name.toLowerCase().replace(/[^a-z0-9]/g, '-');
  if (!ALL_FIGHTERS[key]) {
    ALL_FIGHTERS[key] = { ...f, id: key, events: [eventId], upcoming: [], results: [] };
  } else {
    if (!ALL_FIGHTERS[key].events.includes(eventId)) ALL_FIGHTERS[key].events.push(eventId);
    // Merge in any new data
    Object.keys(f).forEach(k => { if (f[k] && f[k] !== 'tbd' && f[k] !== 'loss') ALL_FIGHTERS[key][k] = f[k]; });
  }
}
UPCOMING_EVENTS.forEach(ev => ev.fights.forEach(f => { indexFighter(f.fighter1, ev.id); indexFighter(f.fighter2, ev.id); }));

P4P_RANKINGS.forEach(r => {
  const key = r.name.toLowerCase().replace(/[^a-z0-9]/g, '-');

  else Object.keys(r).forEach(k => { if (r[k]) ALL_FIGHTERS[key][k] = r[k]; });
});

  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function daysUntil(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const diff = Math.ceil((d - TODAY) / (1000 * 60 * 60 * 24));
  if (diff === 0) return "TODAY";
  if (diff === 1) return "TOMORROW";
  if (diff < 0) return `${Math.abs(diff)}d ago`;
  if (diff <= 7) return `${diff} days`;
  if (diff <= 30) return `${Math.ceil(diff / 7)} weeks`;
  return `${Math.ceil(diff / 30)} months`;
}

function getCountdownClass(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const diff = Math.ceil((d - TODAY) / (1000 * 60 * 60 * 24));
  if (diff <= 1) return "bg-red-600 text-white";
  if (diff <= 7) return "bg-amber-500/20 text-amber-400";
  return "bg-slate-700 text-slate-300";
}

function getStreamingColor(platform) {
  const p = platform.toLowerCase();
  if (p.includes('dazn')) return 'bg-yellow-500/20 text-yellow-300 border-yellow-500/30';
  if (p.includes('paramount')) return 'bg-blue-500/20 text-blue-300 border-blue-500/30';
  if (p.includes('prime') || p.includes('amazon')) return 'bg-cyan-500/20 text-cyan-300 border-cyan-500/30';
  if (p.includes('sky')) return 'bg-red-500/20 text-red-300 border-red-500/30';
  if (p.includes('espn')) return 'bg-orange-500/20 text-orange-300 border-orange-500/30';
  return 'bg-slate-500/20 text-slate-300 border-slate-500/30';
}

function getPromoterBadge(promoter) {
  const p = promoter.toLowerCase();
  if (p.includes('zuffa')) return { label: 'Zuffa', color: 'bg-purple-500/20 text-purple-300' };
  if (p.includes('matchroom')) return { label: 'Matchroom', color: 'bg-cyan-500/20 text-cyan-300' };
  if (p.includes('pbc') || p.includes('tgb')) return { label: 'PBC', color: 'bg-amber-500/20 text-amber-300' };
  if (p.includes('queensberry')) return { label: 'Queensberry', color: 'bg-emerald-500/20 text-emerald-300' };
  if (p.includes('mvp') || p.includes('most valuable')) return { label: 'MVP', color: 'bg-pink-500/20 text-pink-300' };
  if (p.includes('wasserman')) return { label: 'Wasserman', color: 'bg-indigo-500/20 text-indigo-300' };
  if (p.includes('pacquiao')) return { label: 'Pacquiao Promo', color: 'bg-yellow-500/20 text-yellow-300' };
  return { label: promoter.split('/')[0].trim(), color: 'bg-slate-500/20 text-slate-300' };
}

function countryFlag(country) {
  const flags = {
    'usa': '🇺🇸', 'australia': '🇦🇺', 'uk': '🇬🇧', 'uk/zimbabwe': '🇬🇧', 'england': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',
    'northern ireland': '🇬🇧', 'ireland': '🇮🇪', 'mexico': '🇲🇽', 'ukraine': '🇺🇦',
    'japan': '🇯🇵', 'cuba': '🇨🇺', 'venezuela': '🇻🇪', 'netherlands': '🇳🇱',
    'belarus/usa': '🇧🇾', 'usa/mexico': '🇺🇸', 'scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿',
    'dominican republic': '🇩🇴', 'poland': '🇵🇱', 'czech republic': '🇨🇿', 'egypt': '🇪🇬'
  };
  if (!country) return '';
  return flags[country.toLowerCase()] || '🌍';
}

function getFighterInitials(name) {
  return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
}

function getWinRate(record) {
  if (!record || record === 'tbd' || record === 'loss' || record === 'champion' || record === 'former champion' || record === 'prospect' || record === 'veteran' || record === 'undefeated' || record === 'unbeaten' || record === 'winner' || record.includes('kickboxing')) return null;
  const parts = record.replace(/\s*\(.*\)/, '').split('-').map(Number);
  if (parts.length < 2) return null;
  const total = parts[0] + parts[1] + (parts[2] || 0);
  if (total === 0) return null;
  return Math.round((parts[0] / total) * 100);
}

function getKoRate(record, kos) {
  if (!record || !kos) return null;
  const wins = parseInt(record.split('-')[0]);
  if (!wins) return null;
  return Math.round((kos / wins) * 100);
}

// EVENT DETAIL
function EventDetail({ eventId, navigate, reminders, setReminders, predictions, setPredictions }) {
  const allEvents = [...UPCOMING_EVENTS, ...RECENT_RESULTS];
  const event = allEvents.find(e => e.id === eventId);
  
  if (!event) {
    return h('div', { className: 'text-center py-20 animate-in' },
      h(AlertCircle, { size: 48, className: 'mx-auto text-text-faint mb-4' }),
      h('h2', { className: 'font-display text-2xl mb-2' }, 'EVENT NOT FOUND'),
      h('button', { onClick: () => navigate(''), className: 'text-red hover:underline text-sm' }, 'Back to Dashboard')
    );
  }

  const isCompleted = event.status === 'completed';
  const hasReminder = reminders.some(r => r.eventId === eventId);

  function toggleReminder() {
    if (hasReminder) {
      setReminders(reminders.filter(r => r.eventId !== eventId));
    } else {
      setReminders([...reminders, { eventId, eventName: event.eventName, date: event.date, time: event.time }]);
    }
  }

  return h('div', { className: 'space-y-6 animate-in' },
    // Breadcrumb
    h('div', { className: 'flex items-center gap-2 text-sm text-text-muted' },
      h('button', { onClick: () => navigate(''), className: 'hover:text-text transition-colors' }, 'Dashboard'),
      h(ChevronRight, { size: 14 }),
      h('span', { className: 'text-text' }, event.eventName)
    ),

    // Header
    h('div', { className: `relative overflow-hidden rounded-xl border ${isCompleted ? 'border-green/30 bg-gradient-to-br from-slate-900 via-green-950/20 to-slate-900' : 'border-red/20 bg-gradient-to-br from-slate-900 via-red-950/20 to-slate-900'}` },
      h('div', { className: 'relative z-10 p-6' },
        h('div', { className: 'flex flex-wrap items-start justify-between gap-4' },
          h('div', null,
            h('div', { className: 'flex flex-wrap items-center gap-2 mb-3' },
              h('span', { className: `${getPromoterBadge(event.promoter).color} text-xs font-semibold px-2 py-0.5 rounded` }, getPromoterBadge(event.promoter).label),
              event.streaming.map(s => h(StreamingBadge, { key: s, platform: s })),
              event.ppvPrice && h('span', { className: 'text-xs font-bold text-amber-400 bg-amber-400/10 px-2 py-0.5 rounded' }, event.ppvPrice),
              isCompleted && h('span', { className: 'text-xs font-bold text-green bg-green-bg px-2 py-0.5 rounded' }, 'COMPLETED'),
              event.note && h('span', { className: 'text-xs font-bold text-pink-300 bg-pink-500/15 px-2 py-0.5 rounded' }, event.note)
            ),
            h('h1', { className: 'font-display text-3xl md:text-4xl tracking-wide text-white' }, event.eventName),
            h('div', { className: 'flex flex-wrap gap-4 mt-3 text-sm text-text-muted' },
              h('span', { className: 'flex items-center gap-1.5' }, h(Calendar, { size: 14 }), formatDate(event.date)),
              event.time && h('span', { className: 'flex items-center gap-1.5' }, h(Clock, { size: 14 }), event.time),
              h('span', { className: 'flex items-center gap-1.5' }, h(MapPin, { size: 14 }), `${event.venue}, ${event.city}, ${event.country}`)
            )
          ),
          !isCompleted && h('button', {
            onClick: toggleReminder,
            className: `flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${

          h('button', {

            className: 'inline-block hover:opacity-80 transition-opacity'
          },
            h(FighterAvatar, { name: fight.fighter1.name, size: 'lg', country: fight.fighter1.country }),

// CALENDAR
function CalendarPage({ navigate }) {
  const [currentMonth, setCurrentMonth] = useState(new Date(2026, 2, 1)); // March 2026
  
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  
  const days = [];
  for (let i = 0; i < firstDay; i++) days.push(null);
  for (let i = 1; i <= daysInMonth; i++) days.push(i);
  
  const monthStr = currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  
  // Events for this month
  const allEvents = [...UPCOMING_EVENTS, ...RECENT_RESULTS];
  const monthEvents = allEvents.filter(ev => {
    const d = new Date(ev.date + 'T12:00:00');
    return d.getMonth() === month && d.getFullYear() === year;
  });

  function getEventsForDay(day) {
    return monthEvents.filter(ev => {
      const d = new Date(ev.date + 'T12:00:00');
      return d.getDate() === day;
    });
  }

  function goToToday() {
    setCurrentMonth(new Date(2026, 2, 1));
  }

  return h('div', { className: 'space-y-6 animate-in' },
    h('div', { className: 'flex items-center justify-between' },
      h('h1', { className: 'font-display text-3xl tracking-wide' }, 'CALENDAR'),
      h('div', { className: 'flex items-center gap-2' },
        h('button', { onClick: goToToday, className: 'px-3 py-1.5 text-xs font-medium bg-surface border border-border rounded-lg hover:bg-surface-2 transition-colors' }, 'Today'),
        h('button', { onClick: () => setCurrentMonth(new Date(year, month - 1, 1)), className: 'p-2 rounded-lg bg-surface border border-border hover:bg-surface-2 transition-colors' },
          h(ChevronLeft, { size: 16 })
        ),
        h('span', { className: 'font-display text-xl tracking-wide min-w-[180px] text-center' }, monthStr.toUpperCase()),
        h('button', { onClick: () => setCurrentMonth(new Date(year, month + 1, 1)), className: 'p-2 rounded-lg bg-surface border border-border hover:bg-surface-2 transition-colors' },
          h(ChevronRight, { size: 16 })
        )
      )
    ),

    // Calendar grid
    h('div', { className: 'bg-surface rounded-xl border border-border overflow-hidden' },
      h('div', { className: 'grid grid-cols-7 border-b border-border' },
        ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d =>
          h('div', { key: d, className: 'py-2 text-center text-xs font-semibold text-text-faint uppercase' }, d)
        )
      ),
      h('div', { className: 'grid grid-cols-7' },
        days.map((day, i) => {
          const events = day ? getEventsForDay(day) : [];
          const isToday = day === 7 && month === 2 && year === 2026;
          return h('div', {
            key: i,
            className: `min-h-[80px] md:min-h-[100px] border-b border-r border-border/50 p-1.5 ${
              day ? 'hover:bg-surface-2/50 cursor-pointer' : 'bg-surface-2/20'
            } ${isToday ? 'bg-red/5' : ''}`
          },
            day && h('div', null,
              h('div', { className: `text-xs font-medium mb-1 ${isToday ? 'text-red font-bold' : 'text-text-muted'}` },
                isToday ? h('span', { className: 'bg-red text-white w-5 h-5 rounded-full inline-flex items-center justify-center text-[10px]' }, day) : day
              ),
              events.map(ev =>
                h('button', {
                  key: ev.id,
                  onClick: () => navigate(`event/${ev.id}`),
                  className: `w-full text-left text-[9px] md:text-[10px] font-medium px-1 py-0.5 rounded mb-0.5 truncate transition-colors ${
                    ev.status === 'completed'
                      ? 'bg-green-bg text-green hover:bg-green/20'
                      : ev.fights.some(f => f.isTitleFight)
                        ? 'bg-amber-500/10 text-amber-300 hover:bg-amber-500/20'
                        : 'bg-red/10 text-red-300 hover:bg-red/20'
                  }`
                }, ev.eventName)
              )
            )
          );
        })
      )
    ),

    // Events list for this month
    monthEvents.length > 0 && h('div', null,
      h('h2', { className: 'font-display text-xl tracking-wide mb-3' }, `${monthStr.toUpperCase()} EVENTS`),
      h('div', { className: 'space-y-2' },
        monthEvents.sort((a, b) => a.date.localeCompare(b.date)).map(ev =>
          h(EventCard, { key: ev.id, event: { ...ev, status: ev.status }, navigate })
        )
      )
    )
  );
}

// STATS
function StatsPage({ navigate }) {
  // Compute stats from all data
  const totalUpcoming = UPCOMING_EVENTS.length;
  const totalFights = UPCOMING_EVENTS.reduce((acc, ev) => acc + ev.fights.length, 0);
  const titleFights = UPCOMING_EVENTS.reduce((acc, ev) => acc + ev.fights.filter(f => f.isTitleFight).length, 0);
  const allPlatforms = [...new Set(UPCOMING_EVENTS.flatMap(e => e.streaming))];
  const allCountries = [...new Set(UPCOMING_EVENTS.map(e => e.country))];
  const allPromoters = [...new Set(UPCOMING_EVENTS.map(e => e.promoter))];
  const allWeightClasses = [...new Set([...UPCOMING_EVENTS, ...RECENT_RESULTS].flatMap(e => e.fights.map(f => f.weightClass)))];
  
  // Weight class fight distribution
  const wcCounts = {};
  [...UPCOMING_EVENTS, ...RECENT_RESULTS].forEach(ev => {
    ev.fights.forEach(f => {
      wcCounts[f.weightClass] = (wcCounts[f.weightClass] || 0) + 1;
    });
  });
  const sortedWC = Object.entries(wcCounts).sort((a, b) => b[1] - a[1]);
  const maxWC = sortedWC[0] ? sortedWC[0][1] : 1;

  // Country distribution
  const countryCounts = {};
  [...UPCOMING_EVENTS, ...RECENT_RESULTS].forEach(ev => {
    countryCounts[ev.country] = (countryCounts[ev.country] || 0) + 1;
  });
  const sortedCountries = Object.entries(countryCounts).sort((a, b) => b[1] - a[1]);

  // Platform distribution
  const platformCounts = {};
  UPCOMING_EVENTS.forEach(ev => {
    ev.streaming.forEach(s => {
      platformCounts[s] = (platformCounts[s] || 0) + 1;
    });
  });
  const sortedPlatforms = Object.entries(platformCounts).sort((a, b) => b[1] - a[1]);

  // Undefeated fighters in upcoming events
  const undefeated = [];
  UPCOMING_EVENTS.forEach(ev => {
    ev.fights.forEach(f => {
      [f.fighter1, f.fighter2].forEach(fighter => {
        if (fighter.record && /^\d+-0(-\d+)?$/.test(fighter.record) && !undefeated.find(u => u.name === fighter.name)) {
          undefeated.push(fighter);
        }
      });
    });
  });

  return h('div', { className: 'space-y-6 animate-in' },
    h('div', null,
      h('h1', { className: 'font-display text-3xl tracking-wide' }, 'BOXING STATS'),
      h('p', { className: 'text-sm text-text-muted mt-1' }, 'Data overview for upcoming and recent events')
    ),

    // Overview cards
    h('div', { className: 'grid grid-cols-2 lg:grid-cols-4 gap-3' },
      h(StatBox, { label: 'Upcoming Events', value: totalUpcoming, icon: Calendar }),
      h(StatBox, { label: 'Total Fights', value: totalFights, icon: Swords }),
      h(StatBox, { label: 'Title Fights', value: titleFights, icon: Award }),
      h(StatBox, { label: 'Undefeated Fighters', value: undefeated.length, icon: Shield })
    ),

    // Weight class distribution
    h('div', { className: 'bg-surface rounded-xl border border-border p-4' },
      h('h3', { className: 'font-display text-lg tracking-wide mb-4' }, 'FIGHTS BY WEIGHT CLASS'),
      h('div', { className: 'space-y-2' },
        sortedWC.map(([wc, count]) =>
          h('div', { key: wc, className: 'flex items-center gap-3' },
            h('div', { className: 'w-40 text-xs text-text-muted truncate shrink-0' }, wc),
            h('div', { className: 'flex-1 h-5 bg-surface-3 rounded-full overflow-hidden' },
              h('div', { className: 'h-full bg-red rounded-full transition-all', style: { width: `${(count / maxWC) * 100}%` } })
            ),
            h('div', { className: 'w-6 text-right text-xs font-bold tabular-nums' }, count)
          )
        )
      )
    ),

    // Platform + Country side by side
    h('div', { className: 'grid md:grid-cols-2 gap-4' },
      h('div', { className: 'bg-surface rounded-xl border border-border p-4' },
        h('h3', { className: 'font-display text-lg tracking-wide mb-3' }, 'BY PLATFORM'),
        h('div', { className: 'space-y-2' },
          sortedPlatforms.map(([p, count]) =>
            h('div', { key: p, className: 'flex items-center justify-between py-2 border-b border-border/50 last:border-0' },
              h(StreamingBadge, { platform: p }),
              h('span', { className: 'text-sm font-bold tabular-nums' }, `${count} event${count > 1 ? 's' : ''}`)
            )
          )
        )
      ),
      h('div', { className: 'bg-surface rounded-xl border border-border p-4' },
        h('h3', { className: 'font-display text-lg tracking-wide mb-3' }, 'BY COUNTRY'),
        h('div', { className: 'space-y-2' },
          sortedCountries.map(([c, count]) =>
            h('div', { key: c, className: 'flex items-center justify-between py-2 border-b border-border/50 last:border-0' },
              h('span', { className: 'text-sm flex items-center gap-2' }, countryFlag(c), c),
              h('span', { className: 'text-sm font-bold tabular-nums' }, `${count} event${count > 1 ? 's' : ''}`)
            )
          )
        )
      )
    ),

    // Undefeated fighters
    undefeated.length > 0 && h('div', { className: 'bg-surface rounded-xl border border-border p-4' },
      h('h3', { className: 'font-display text-lg tracking-wide mb-3 flex items-center gap-2' },
        h(Shield, { size: 18, className: 'text-green' }),
        'UNDEFEATED FIGHTERS IN UPCOMING EVENTS'
      ),
      h('div', { className: 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3' },
        undefeated.map((f, i) =>
          h('button', {
            key: i,
            onClick: () => navigate(`fighter/${f.name.toLowerCase().replace(/[^a-z0-9]/g, '-')}`),
            className: 'bg-surface-2 hover:bg-surface-3 rounded-lg p-3 text-left transition-colors'
          },
            h('div', { className: 'font-display text-sm tracking-wide' }, f.name),
            h('div', { className: 'text-xs text-green tabular-nums mt-0.5' }, f.record),
            f.country && h('div', { className: 'text-xs text-text-faint mt-0.5' }, `${countryFlag(f.country)} ${f.country}`)
          )
        )
      )
    )
  );
}

// REPORTS
function Reports({ navigate }) {
  const [selectedEvents, setSelectedEvents] = useState([]);
  const [includeUndercard, setIncludeUndercard] = useState(true);
  const [includeTape, setIncludeTape] = useState(true);
  const [reportMode, setReportMode] = useState('detailed');
  const [preview, setPreview] = useState('');

  function toggleEvent(id) {
    setSelectedEvents(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  }

  function generateReport() {
    const allEvents = [...UPCOMING_EVENTS, ...RECENT_RESULTS];
    const events = allEvents.filter(e => selectedEvents.includes(e.id));
    
    let md = `# Squared Circle Tracker — Boxing Report\n`;
    md += `Generated: March 7, 2026\n\n`;
    
    events.forEach(ev => {
      md += `## ${ev.eventName}\n`;
      md += `**Date:** ${formatDate(ev.date)}\n`;
      md += `**Venue:** ${ev.venue}, ${ev.city}, ${ev.country}\n`;
      md += `**Streaming:** ${ev.streaming.join(', ')}`;
      if (ev.time) md += ` | ${ev.time}`;
      md += `\n`;
      if (ev.ppvPrice) md += `**PPV Price:** ${ev.ppvPrice}\n`;
      md += `\n`;

      const fights = includeUndercard ? ev.fights : ev.fights.filter(f => f.isMainEvent || f.isCoMainEvent);
      
      fights.forEach(f => {
        const tag = f.isMainEvent ? '**MAIN EVENT**' : f.isCoMainEvent ? '**CO-MAIN**' : '';
        md += `### ${tag} ${f.fighter1.name} vs ${f.fighter2.name}\n`;
        md += `${f.weightClass} • ${f.rounds} Rounds\n`;
        if (f.isTitleFight && f.titles) md += `🏆 ${f.titles.join(', ')}\n`;
        
        if (f.result) {
          md += `**Result:** ${f.result.winner} wins by ${f.result.method}`;
          if (f.result.round) md += ` in Round ${f.result.round}`;
          if (f.result.time) md += ` at ${f.result.time}`;
          md += `\n`;
        }

        if (includeTape && reportMode === 'detailed') {
          md += `\n| Stat | ${f.fighter1.name} | ${f.fighter2.name} |\n`;
          md += `|---|---|---|\n`;
          if (f.fighter1.record) md += `| Record | ${f.fighter1.record} | ${f.fighter2.record || 'TBD'} |\n`;
          if (f.fighter1.height) md += `| Height | ${f.fighter1.height} | ${f.fighter2.height || '—'} |\n`;
          if (f.fighter1.reach) md += `| Reach | ${f.fighter1.reach} | ${f.fighter2.reach || '—'} |\n`;
          if (f.fighter1.stance) md += `| Stance | ${f.fighter1.stance} | ${f.fighter2.stance || '—'} |\n`;
          if (f.fighter1.country) md += `| Country | ${f.fighter1.country} | ${f.fighter2.country || '—'} |\n`;
        }
        md += `\n`;
      });
      md += `---\n\n`;
    });

    setPreview(md);
  }

  function downloadReport() {
    const blob = new Blob([preview], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'boxing-report.md';
    a.click();
    URL.revokeObjectURL(url);
  }

  return h('div', { className: 'space-y-6 animate-in' },
    h('div', null,
      h('h1', { className: 'font-display text-3xl tracking-wide' }, 'REPORT GENERATOR'),
      h('p', { className: 'text-sm text-text-muted mt-1' }, 'Create custom boxing event reports')
    ),

    // Event selection
    h('div', { className: 'bg-surface rounded-xl border border-border p-4' },
      h('h3', { className: 'font-display text-lg tracking-wide mb-3' }, 'SELECT EVENTS'),
      h('div', { className: 'space-y-2 max-h-64 overflow-y-auto' },
        [...UPCOMING_EVENTS, ...RECENT_RESULTS].map(ev =>
          h('label', { key: ev.id, className: 'flex items-center gap-3 p-2 rounded-lg hover:bg-surface-2 cursor-pointer transition-colors' },
            h('input', {
              type: 'checkbox',
              checked: selectedEvents.includes(ev.id),
              onChange: () => toggleEvent(ev.id),
              className: 'w-4 h-4 rounded accent-red-600'
            }),
            h('div', { className: 'flex-1 min-w-0' },
              h('div', { className: 'text-sm font-semibold truncate' }, ev.eventName),
              h('div', { className: 'text-xs text-text-muted' }, `${formatDateShort(ev.date)} • ${ev.venue}`)
            ),
            ev.status === 'completed' && h('span', { className: 'text-[10px] font-bold text-green bg-green-bg px-2 py-0.5 rounded' }, 'RESULT')
          )
        )
      )
    ),

    // Options
    h('div', { className: 'bg-surface rounded-xl border border-border p-4' },
      h('h3', { className: 'font-display text-lg tracking-wide mb-3' }, 'OPTIONS'),
      h('div', { className: 'space-y-3' },
        h('label', { className: 'flex items-center gap-3 text-sm cursor-pointer' },
          h('input', { type: 'checkbox', checked: includeUndercard, onChange: () => setIncludeUndercard(!includeUndercard), className: 'w-4 h-4 rounded accent-red-600' }),
          'Include undercard fights'
        ),
        h('label', { className: 'flex items-center gap-3 text-sm cursor-pointer' },
          h('input', { type: 'checkbox', checked: includeTape, onChange: () => setIncludeTape(!includeTape), className: 'w-4 h-4 rounded accent-red-600' }),
          'Include Tale of the Tape'
        ),
        h('div', { className: 'flex items-center gap-3' },
          h('span', { className: 'text-sm text-text-muted' }, 'Detail level:'),
          h('select', {
            value: reportMode,
            onChange: (e) => setReportMode(e.target.value),
            className: 'bg-surface-2 border border-border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-red/50'
          },
            h('option', { value: 'summary' }, 'Summary'),
            h('option', { value: 'detailed' }, 'Detailed')
          )
        )
      )
    ),

    // Generate button
    h('div', { className: 'flex gap-3' },
      h('button', {
        onClick: generateReport,
        disabled: selectedEvents.length === 0,
        className: 'flex items-center gap-2 px-6 py-2.5 bg-red text-white rounded-lg text-sm font-semibold hover:bg-red-hover transition-colors disabled:opacity-40 disabled:cursor-not-allowed'
      }, h(Eye, { size: 16 }), 'Generate Preview'),
      preview && h('button', {
        onClick: downloadReport,
        className: 'flex items-center gap-2 px-6 py-2.5 bg-surface border border-border rounded-lg text-sm font-semibold hover:bg-surface-2 transition-colors'
      }, h(Download, { size: 16 }), 'Download .md')
    ),

    // Preview
    preview && h('div', { className: 'bg-surface rounded-xl border border-border p-4' },
      h('h3', { className: 'font-display text-lg tracking-wide mb-3' }, 'PREVIEW'),
      h('pre', { className: 'text-xs text-text-muted whitespace-pre-wrap font-mono max-h-96 overflow-y-auto leading-relaxed' }, preview)
    )
  );
}

function App() {
  const [route, setRoute] = useState(window.location.hash.slice(2) || '');
  const [mobileOpen, setMobileOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [reminders, setReminders] = useState([]);
  const [predictions, setPredictions] = useState({});

  useEffect(() => {
    function onHashChange() {
      setRoute(window.location.hash.slice(2) || '');
      setSearchQuery('');
    }
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  function navigate(path) {
    window.location.hash = '#/' + path;
  }

  const currentPage = route.split('/')[0] || '';

  function renderPage() {
    if (route.startsWith('event/')) {
      return h(EventDetail, { eventId: route.split('/')[1], navigate, reminders, setReminders, predictions, setPredictions });
    }
    if (route.startsWith('fighter/')) {
      return h(FighterProfile, { fighterId: route.split('/').slice(1).join('/'), navigate });
    }
    switch (currentPage) {
      case 'rankings': return h(Rankings, { navigate });
      case 'stats': return h(StatsPage, { navigate });
      case 'calendar': return h(CalendarPage, { navigate });
      case 'reminders': return h(Reminders, { reminders, setReminders, navigate });
      case 'reports': return h(Reports, { navigate });
      default: return h(Dashboard, { navigate, reminders, setReminders });
    }
  }

  return h('div', { className: 'h-screen overflow-hidden' },
    // Sidebar
    h(Sidebar, { currentPage, navigate, mobileOpen, setMobileOpen }),
    
    // Main area
    h('div', { className: 'h-full flex flex-col main-area' },
      // Top bar with search
      h('div', { className: 'relative' },
        h(TopBar, { setMobileOpen, navigate, searchQuery, setSearchQuery }),
        searchQuery.length >= 2 && h('div', { className: 'absolute top-full left-0 right-0 z-50 px-4 lg:px-6' },
          h('div', { className: 'max-w-md' },
            h(SearchResults, { query: searchQuery, navigate: (path) => { navigate(path); setSearchQuery(''); } })
          )
        )
      ),
      
      // Main content
      h('main', { className: 'flex-1 overflow-y-auto overscroll-contain' },
        h('div', { className: 'max-w-5xl mx-auto px-4 lg:px-6 py-6 pb-24 lg:pb-6' },
          renderPage()
        )
      )
    ),
    
    // Mobile bottom nav
    h(MobileNav, { currentPage, navigate })
  );
}

// Mount
const root = createRoot(document.getElementById('root'));
root.render(h(App));
</script>
</body>
